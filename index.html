<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hamster Lapar Aesthetic</title>
    <!-- Tailwind CSS untuk styling yang cepat dan responsif -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Quicksand untuk kesan bulat, lembut, dan aesthetic -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none; /* Mencegah layar tertarik saat digeser di HP */
        }

        /* Gradasi pastel untuk background game */
        .game-bg {
            background: linear-gradient(120deg, #e0c3fc 0%, #8ec5fc 100%);
            position: relative;
            overflow: hidden;
        }

        /* Efek Glassmorphism (kaca aesthetic) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .falling-item {
            position: absolute;
            font-size: 2.5rem;
            user-select: none;
            /* Efek bayangan lembut pada emoji */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            z-index: 10;
        }

        #player {
            position: absolute;
            bottom: 20px;
            font-size: 4rem;
            user-select: none;
            transition: transform 0.1s ease-out;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.2));
            z-index: 20;
            /* Memusatkan titik transform di tengah karakter */
            transform-origin: center bottom;
        }

        /* Animasi saat hamster makan */
        .eat-anim {
            transform: scale(1.2, 0.8) !important;
        }

        /* Animasi teks mengambang saat dapat skor */
        .floating-text {
            position: absolute;
            font-weight: bold;
            color: white;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
            z-index: 30;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(1.5); opacity: 0; }
        }

        /* Animasi goyang saat kena rintangan */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
        .shake-screen {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>
<body class="text-gray-800 antialiased">

    <!-- Container Utama Game (Dibatasi ukurannya agar pas seperti main di HP walau di desktop) -->
    <div id="gameBox" class="game-bg w-full h-[100dvh] sm:h-[800px] sm:max-w-md sm:rounded-[40px] sm:shadow-2xl flex flex-col relative">
        
        <!-- Header (Skor dan Nyawa) -->
        <div class="glass-panel m-4 p-4 rounded-2xl flex justify-between items-center z-30">
            <div class="flex flex-col">
                <span class="text-sm font-bold text-gray-600 uppercase tracking-wider">Skor</span>
                <span id="scoreDisplay" class="text-3xl font-bold text-white drop-shadow-md">0</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-sm font-bold text-gray-600 uppercase tracking-wider">Nyawa</span>
                <span id="livesDisplay" class="text-2xl tracking-widest">❤️❤️❤️</span>
            </div>
        </div>

        <!-- Karakter Pemain (Hamster) -->
        <div id="player">🐹</div>

        <!-- Menu Start / Game Over Overlay -->
        <div id="menuOverlay" class="absolute inset-0 flex items-center justify-center z-50 p-6">
            <div class="glass-panel w-full rounded-3xl p-8 text-center transform transition-all duration-300">
                <h1 id="menuTitle" class="text-4xl font-bold text-gray-800 mb-2">Hamster Lapar</h1>
                <p id="menuDesc" class="text-gray-600 font-medium mb-6">Bantu Hamster menangkap cemilan manis! Hindari sayuran dan makanan pedas.</p>
                
                <div id="scoreResult" class="hidden mb-6">
                    <p class="text-gray-600 font-bold uppercase text-sm">Skor Akhir Kamu</p>
                    <p id="finalScore" class="text-5xl font-bold text-pink-500 drop-shadow-sm">0</p>
                </div>

                <div class="flex justify-center gap-4 mb-8 text-3xl">
                    <span class="animate-bounce" style="animation-delay: 0s;">🍓</span>
                    <span class="animate-bounce" style="animation-delay: 0.1s;">🍰</span>
                    <span class="animate-bounce" style="animation-delay: 0.2s;">🍡</span>
                </div>

                <button id="startBtn" class="bg-white text-pink-500 font-bold text-xl py-3 px-8 rounded-full shadow-lg hover:bg-pink-50 hover:scale-105 active:scale-95 transition-all w-full border-2 border-pink-100">
                    Mulai Main!
                </button>
            </div>
        </div>

    </div>

    <script>
        // --- Konfigurasi Game ---
        const gameBox = document.getElementById('gameBox');
        const player = document.getElementById('player');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const livesDisplay = document.getElementById('livesDisplay');
        const menuOverlay = document.getElementById('menuOverlay');
        const startBtn = document.getElementById('startBtn');
        const menuTitle = document.getElementById('menuTitle');
        const menuDesc = document.getElementById('menuDesc');
        const scoreResult = document.getElementById('scoreResult');
        const finalScore = document.getElementById('finalScore');

        // Daftar Item (Emoji)
        const goodItems = ['🍓', '🍰', '🍡', '🍩', '🍪', '🥞', '🍉'];
        const badItems = ['🥦', '🌶️', '💣']; // Hamster tidak suka ini!

        // Variabel Status Game
        let score = 0;
        let lives = 3;
        let isPlaying = false;
        let items = [];
        let gameLoopId;
        let spawnInterval;
        let baseSpeed = 3;
        let spawnRate = 1000; // ms

        // Posisi Pemain (di tengah awalnya)
        let playerX = gameBox.clientWidth / 2 - 32; 

        // Fungsi Memulai Game
        function startGame() {
            score = 0;
            lives = 3;
            isPlaying = true;
            items.forEach(item => item.el.remove()); // Bersihkan layar
            items = [];
            baseSpeed = 3;
            spawnRate = 1200;
            
            updateUI();
            
            // Sembunyikan Menu
            menuOverlay.classList.add('opacity-0', 'pointer-events-none');
            scoreResult.classList.add('hidden');

            // Set posisi awal player di tengah
            playerX = gameBox.clientWidth / 2 - (player.offsetWidth / 2);
            updatePlayerPosition();

            // Mulai Loop Game
            gameLoopId = requestAnimationFrame(gameLoop);
            scheduleSpawn();
        }

        // Fungsi Akhiri Game
        function gameOver() {
            isPlaying = false;
            cancelAnimationFrame(gameLoopId);
            clearTimeout(spawnInterval);

            // Tampilkan Menu Game Over
            menuTitle.innerText = "Yaaah, Kenyang!";
            menuDesc.innerText = "Hamster sudah tidak kuat makan lagi.";
            finalScore.innerText = score;
            
            scoreResult.classList.remove('hidden');
            menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
            startBtn.innerText = "Main Lagi";
        }

        // Update Text di Layar (Skor & Nyawa)
        function updateUI() {
            scoreDisplay.innerText = score;
            // Bikin string hati sesuai jumlah nyawa
            let heartString = '';
            for(let i=0; i<lives; i++) heartString += '❤️';
            for(let i=lives; i<3; i++) heartString += '🤍'; // Hati kosong
            livesDisplay.innerText = heartString;
        }

        // Kontrol Pemain (Mouse & Touch)
        function movePlayer(clientX) {
            if (!isPlaying) return;
            const boxRect = gameBox.getBoundingClientRect();
            // Menghitung posisi kursor relatif terhadap kotak game
            let relativeX = clientX - boxRect.left;
            
            // Menyesuaikan posisi agar karakter berada di tengah jari/kursor
            let newX = relativeX - (player.offsetWidth / 2);

            // Membatasi pergerakan agar tidak keluar layar
            if (newX < 0) newX = 0;
            if (newX > boxRect.width - player.offsetWidth) newX = boxRect.width - player.offsetWidth;

            playerX = newX;
            updatePlayerPosition();
        }

        function updatePlayerPosition() {
            player.style.left = `${playerX}px`;
        }

        // Event Listener Mouse dan Touch (HP)
        gameBox.addEventListener('mousemove', (e) => {
            movePlayer(e.clientX);
        });

        gameBox.addEventListener('touchmove', (e) => {
            // e.preventDefault(); // Di-handle oleh CSS touch-action: none
            movePlayer(e.touches[0].clientX);
        });

        // Memunculkan Item Jatuh
        function scheduleSpawn() {
            if (!isPlaying) return;
            
            spawnItem();
            
            // Semakin tinggi skor, semakin cepat item muncul
            let currentSpawnRate = Math.max(400, spawnRate - (score * 5));
            spawnInterval = setTimeout(scheduleSpawn, currentSpawnRate);
        }

        function spawnItem() {
            // Tentukan tipe item (80% baik, 20% buruk)
            const isGood = Math.random() > 0.2;
            const emojiList = isGood ? goodItems : badItems;
            const emoji = emojiList[Math.floor(Math.random() * emojiList.length)];

            // Buat elemen HTML
            const el = document.createElement('div');
            el.className = 'falling-item';
            el.innerText = emoji;
            
            // Posisi acak di atas layar
            const startX = Math.random() * (gameBox.clientWidth - 40); // 40px asumsi lebar font
            el.style.left = `${startX}px`;
            el.style.top = `-50px`;

            gameBox.appendChild(el);

            // Simpan data item
            items.push({
                el: el,
                x: startX,
                y: -50,
                isGood: isGood,
                // Variasi kecepatan sedikit tiap item
                speed: baseSpeed + (Math.random() * 1.5) + (score * 0.05)
            });
        }

        // Menampilkan teks +10 atau -Nyawa di layar
        function showFloatingText(text, x, y, isGood) {
            const floatEl = document.createElement('div');
            floatEl.className = `floating-text ${isGood ? 'text-green-400' : 'text-red-500'}`;
            floatEl.innerText = text;
            floatEl.style.left = `${x}px`;
            floatEl.style.top = `${y}px`;
            gameBox.appendChild(floatEl);

            // Hapus elemen setelah animasi selesai (1 detik)
            setTimeout(() => {
                floatEl.remove();
            }, 1000);
        }

        // Cek tabrakan antara hamster dan item
        function checkCollision(itemRect, playerRect) {
            // Tambahkan sedikit toleransi agar tabrakan terasa lebih adil/nyaman (hitbox diperkecil sedikit)
            const tolerance = 10;
            return !(
                itemRect.right - tolerance < playerRect.left + tolerance || 
                itemRect.left + tolerance > playerRect.right - tolerance || 
                itemRect.bottom - tolerance < playerRect.top + tolerance || 
                itemRect.top + tolerance > playerRect.bottom - tolerance
            );
        }

        // Loop Utama Game
        function gameLoop() {
            if (!isPlaying) return;

            const playerRect = player.getBoundingClientRect();
            const boxRect = gameBox.getBoundingClientRect();

            // Iterasi dari belakang agar tidak error saat menghapus elemen dari array
            for (let i = items.length - 1; i >= 0; i--) {
                let item = items[i];
                
                // Pindahkan posisi Y ke bawah
                item.y += item.speed;
                item.el.style.top = `${item.y}px`;

                const itemRect = item.el.getBoundingClientRect();

                // Deteksi Tabrakan
                if (checkCollision(itemRect, playerRect)) {
                    // Terkena
                    if (item.isGood) {
                        score += 10;
                        showFloatingText("+10", item.x, item.y, true);
                        
                        // Animasi Hamster mengunyah (Squish)
                        player.classList.add('eat-anim');
                        setTimeout(() => player.classList.remove('eat-anim'), 100);

                        // Tambah speed dasar perlahan
                        baseSpeed += 0.02; 
                    } else {
                        // Kena makanan buruk!
                        lives -= 1;
                        showFloatingText("Aduh!", item.x, item.y, false);
                        
                        // Animasi layar bergetar
                        gameBox.classList.add('shake-screen');
                        setTimeout(() => gameBox.classList.remove('shake-screen'), 300);
                    }

                    updateUI();

                    // Hapus item
                    item.el.remove();
                    items.splice(i, 1);

                    // Cek Game Over
                    if (lives <= 0) {
                        gameOver();
                        return; // Berhenti mengeksekusi loop
                    }
                    continue; // Skip ke item berikutnya
                }

                // Hapus item jika jatuh melewati layar (Missed)
                if (item.y > boxRect.height) {
                    item.el.remove();
                    items.splice(i, 1);
                }
            }

            // Panggil loop lagi untuk frame berikutnya
            gameLoopId = requestAnimationFrame(gameLoop);
        }

        // Event Listener Tombol Start
        startBtn.addEventListener('click', startGame);

    </script>
</body>
</html>
