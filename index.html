<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Harian Aesthetic</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
        }

        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        input[type="time"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: 0.2s;
        }
        input[type="time"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen bg-[#F9F8F6] flex items-center justify-center p-4 md:p-6 text-[#4A4A4A]">

    <!-- Main Card Container -->
    <div class="w-full max-w-md bg-white rounded-[2.5rem] shadow-[0_20px_40px_-15px_rgba(0,0,0,0.05)] overflow-hidden relative h-[90vh] md:h-[85vh] flex flex-col border border-[#F0EFEB]">
        
        <!-- Header Section -->
        <div class="bg-[#FAF9F7] px-8 pt-10 pb-8 rounded-b-[2.5rem] shadow-sm z-10 relative">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <div class="flex items-center gap-2 text-[#8C8C8C] text-sm font-medium mb-1 tracking-wide">
                        <i data-lucide="calendar" class="w-4 h-4"></i>
                        <span id="current-date">Memuat tanggal...</span>
                    </div>
                    <h1 id="greeting-title" class="text-2xl font-semibold text-[#2D2D2D] flex items-center gap-2 mt-2">
                        Selamat Pagi <i data-lucide="coffee" class="w-5 h-5 text-[#D4C4B7]"></i>
                    </h1>
                </div>
                <!-- User Avatar Placeholder -->
                <div class="w-12 h-12 rounded-full bg-[#F3EFEA] border-2 border-white shadow-sm flex items-center justify-center text-[#A39A92]">
                    <i data-lucide="sparkles" class="w-6 h-6"></i>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="mt-4 bg-white p-4 rounded-2xl shadow-[0_4px_20px_rgba(0,0,0,0.02)] border border-[#F5F5F5]">
                <div class="flex justify-between items-end mb-2">
                    <span class="text-sm font-medium text-[#737373]">Progress Hari Ini</span>
                    <span id="progress-percentage" class="text-sm font-bold text-[#2D2D2D]">0%</span>
                </div>
                <div class="w-full bg-[#F0EFEB] rounded-full h-2.5 overflow-hidden">
                    <div id="progress-bar-fill" class="bg-[#D4C4B7] h-2.5 rounded-full transition-all duration-700 ease-out" style="width: 0%;"></div>
                </div>
                <p id="progress-text" class="text-xs text-[#A3A3A3] mt-2 font-medium">
                    0 dari 0 tugas selesai
                </p>
            </div>
        </div>

        <!-- Task List Section -->
        <div class="flex-1 overflow-y-auto px-6 py-6 pb-24 scrollbar-hide">
            <div id="task-list" class="space-y-3">
                <!-- Tugas akan dimuat di sini oleh JavaScript -->
            </div>
        </div>

        <!-- Add Button & Form Overlay -->
        <div class="absolute bottom-0 left-0 right-0 p-6 pointer-events-none">
            <div class="relative w-full max-w-sm mx-auto pointer-events-auto">
                
                <!-- Form -->
                <div id="add-task-form" class="absolute bottom-16 left-0 right-0 bg-white rounded-3xl shadow-[0_10px_40px_rgba(0,0,0,0.1)] p-5 border border-[#F5F5F5] transition-all duration-300 origin-bottom opacity-0 scale-95 translate-y-10 pointer-events-none">
                    <h3 class="text-lg font-semibold text-[#2D2D2D] mb-4">Jadwal Baru</h3>
                    <form id="taskForm" class="space-y-4">
                        <div>
                            <input type="text" id="taskTitle" placeholder="Apa rencanamu?" required class="w-full bg-[#FAF9F7] text-[#2D2D2D] placeholder-[#A3A3A3] px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#D4C4B7] text-sm transition-all" />
                        </div>
                        <div class="flex gap-3">
                            <input type="time" id="taskTime" required class="flex-1 bg-[#FAF9F7] text-[#2D2D2D] px-4 py-3 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#D4C4B7] text-sm transition-all" />
                            <div class="flex items-center gap-1 bg-[#FAF9F7] p-2 rounded-xl" id="color-picker">
                                <!-- Pilihan warna akan di-render di sini -->
                            </div>
                        </div>
                        <button type="submit" id="submitBtn" class="w-full bg-[#2D2D2D] text-white font-medium py-3 rounded-xl hover:bg-[#4A4A4A] transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                            Simpan Jadwal
                        </button>
                    </form>
                </div>

                <!-- Floating Action Button -->
                <div class="flex justify-center mt-4">
                    <button id="fab-button" onclick="toggleForm()" class="flex items-center justify-center w-14 h-14 rounded-full shadow-[0_8px_20px_rgba(212,196,183,0.5)] transition-all duration-300 bg-[#D4C4B7] text-white hover:bg-[#C2B2A5] hover:scale-105">
                        <i data-lucide="plus" class="w-7 h-7"></i>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- Application Logic -->
    <script>
        // State
        let tasks = [
            { id: 1, title: 'Morning Skincare & Stretching', time: '07:00', completed: true, color: 'green' },
            { id: 2, title: 'Matcha Latte & Journaling', time: '08:00', completed: false, color: 'yellow' },
            { id: 3, title: 'Deep Work: Project Alpha', time: '09:30', completed: false, color: 'blue' },
            { id: 4, title: 'Makan Siang & Istirahat', time: '12:00', completed: false, color: 'orange' },
            { id: 5, title: 'Pilates Class / Home Workout', time: '17:00', completed: false, color: 'pink' },
        ];

        let selectedColor = 'pink';
        let isFormOpen = false;

        const colors = {
            pink: { bg: 'bg-[#FDF2F8]', border: 'border-[#FCE7F3]', text: 'text-[#DB2777]', tag: 'bg-[#FCE7F3] text-[#BE185D]' },
            green: { bg: 'bg-[#F0FDF4]', border: 'border-[#DCFCE7]', text: 'text-[#16A34A]', tag: 'bg-[#DCFCE7] text-[#15803D]' },
            blue: { bg: 'bg-[#F0F9FF]', border: 'border-[#E0F2FE]', text: 'text-[#0284C7]', tag: 'bg-[#E0F2FE] text-[#0369A1]' },
            yellow: { bg: 'bg-[#FEFCE8]', border: 'border-[#FEF08A]', text: 'text-[#CA8A04]', tag: 'bg-[#FEF08A] text-[#A16207]' },
            orange: { bg: 'bg-[#FFF7ED]', border: 'border-[#FFEDD5]', text: 'text-[#EA580C]', tag: 'bg-[#FFEDD5] text-[#C2410C]' },
        };

        const colorOptions = Object.keys(colors);

        // Initialize Lucide Icons
        lucide.createIcons();

        // Update Date and Greeting
        function updateHeader() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('current-date').textContent = now.toLocaleDateString('id-ID', options);

            const hour = now.getHours();
            let greeting = 'Selamat Malam';
            let iconName = 'moon';

            if (hour >= 5 && hour < 11) { 
                greeting = 'Selamat Pagi'; 
                iconName = 'coffee'; 
            } else if (hour >= 11 && hour < 15) { 
                greeting = 'Selamat Siang'; 
                iconName = 'sparkles'; 
            } else if (hour >= 15 && hour < 18) { 
                greeting = 'Selamat Sore'; 
                iconName = 'clock'; 
            }

            document.getElementById('greeting-title').innerHTML = `
                ${greeting} <i data-lucide="${iconName}" class="w-5 h-5 text-[#D4C4B7]"></i>
            `;
            lucide.createIcons(); // Re-render icons in header
        }

        // Render Color Picker
        function renderColorPicker() {
            const container = document.getElementById('color-picker');
            container.innerHTML = colorOptions.map(color => `
                <button
                    type="button"
                    onclick="selectColor('${color}')"
                    class="w-6 h-6 rounded-full ${colors[color].bg} border-2 transition-transform ${selectedColor === color ? 'border-gray-400 scale-110' : 'border-transparent hover:scale-110'}"
                    aria-label="Pilih warna ${color}"
                ></button>
            `).join('');
        }

        function selectColor(color) {
            selectedColor = color;
            renderColorPicker(); // Re-render untuk update UI border yang aktif
        }

        // Toggle Form
        function toggleForm() {
            isFormOpen = !isFormOpen;
            const formContainer = document.getElementById('add-task-form');
            const fabButton = document.getElementById('fab-button');

            if (isFormOpen) {
                // Show form
                formContainer.classList.remove('opacity-0', 'scale-95', 'translate-y-10', 'pointer-events-none');
                formContainer.classList.add('opacity-100', 'scale-100', 'translate-y-0');
                
                // Rotate FAB and change to white background
                fabButton.classList.remove('bg-[#D4C4B7]', 'text-white', 'hover:bg-[#C2B2A5]');
                fabButton.classList.add('bg-white', 'text-[#2D2D2D]', 'rotate-45', 'border', 'border-[#E8E6E1]');
            } else {
                // Hide form
                formContainer.classList.add('opacity-0', 'scale-95', 'translate-y-10', 'pointer-events-none');
                formContainer.classList.remove('opacity-100', 'scale-100', 'translate-y-0');
                
                // Reset FAB
                fabButton.classList.add('bg-[#D4C4B7]', 'text-white', 'hover:bg-[#C2B2A5]');
                fabButton.classList.remove('bg-white', 'text-[#2D2D2D]', 'rotate-45', 'border', 'border-[#E8E6E1]');
            }
        }

        // Render Tasks
        function renderTasks() {
            const taskList = document.getElementById('task-list');
            
            if (tasks.length === 0) {
                taskList.innerHTML = `
                    <div class="text-center text-[#A3A3A3] mt-10 flex flex-col items-center">
                        <i data-lucide="sparkles" class="w-12 h-12 mb-3 text-[#E8E6E1]"></i>
                        <p>Belum ada jadwal hari ini.</p>
                        <p class="text-sm">Yuk, rencanakan harimu!</p>
                    </div>
                `;
            } else {
                taskList.innerHTML = tasks.map(task => `
                    <div class="group flex items-center justify-between p-4 rounded-2xl transition-all duration-300 border border-transparent
                        ${task.completed ? 'opacity-60 bg-[#FAFAFA]' : `bg-white shadow-[0_2px_10px_rgba(0,0,0,0.02)] hover:shadow-[0_8px_20px_rgba(0,0,0,0.04)] ${colors[task.color].border} border-opacity-50`}
                    ">
                        <div class="flex items-center gap-4 flex-1">
                            <button onclick="toggleTask(${task.id})" class="transition-colors duration-300 focus:outline-none ${task.completed ? 'text-[#D4C4B7]' : colors[task.color].text}">
                                ${task.completed ? 
                                    '<i data-lucide="check-circle-2" class="w-6 h-6 fill-current text-white bg-[#D4C4B7] rounded-full"></i>' : 
                                    '<i data-lucide="circle" class="w-6 h-6 stroke-2"></i>'
                                }
                            </button>
                            
                            <div class="flex flex-col">
                                <span class="text-base font-medium transition-all duration-300 ${task.completed ? 'text-[#A3A3A3] line-through' : 'text-[#2D2D2D]'}">
                                    ${task.title}
                                </span>
                                <div class="flex items-center gap-2 mt-1">
                                    <span class="text-xs font-semibold px-2 py-0.5 rounded-md flex items-center gap-1 ${task.completed ? 'bg-[#F5F5F5] text-[#A3A3A3]' : colors[task.color].tag}">
                                        <i data-lucide="clock" class="w-3 h-3"></i>
                                        ${task.time}
                                    </span>
                                </div>
                            </div>
                        </div>

                        <button onclick="deleteTask(${task.id})" class="p-2 text-[#D1D1D1] hover:text-[#EF4444] hover:bg-[#FEF2F2] rounded-xl transition-colors opacity-0 group-hover:opacity-100 focus:opacity-100">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `).join('');
            }

            // Update Progress Bar
            const completedTasks = tasks.filter(t => t.completed).length;
            const totalTasks = tasks.length;
            const progressPercentage = totalTasks === 0 ? 0 : Math.round((completedTasks / totalTasks) * 100);

            document.getElementById('progress-percentage').textContent = `${progressPercentage}%`;
            document.getElementById('progress-bar-fill').style.width = `${progressPercentage}%`;
            document.getElementById('progress-text').textContent = `${completedTasks} dari ${totalTasks} tugas selesai`;

            // Render ulang ikon Lucide setelah inject HTML
            lucide.createIcons();
        }

        // Toggle Task Completion
        function toggleTask(id) {
            tasks = tasks.map(task => 
                task.id === id ? { ...task, completed: !task.completed } : task
            );
            renderTasks();
        }

        // Delete Task
        function deleteTask(id) {
            tasks = tasks.filter(task => task.id !== id);
            renderTasks();
        }

        // Handle Form Submit (Add Task)
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const titleInput = document.getElementById('taskTitle');
            const timeInput = document.getElementById('taskTime');
            
            if (!titleInput.value.trim() || !timeInput.value) return;

            const newTask = {
                id: Date.now(),
                title: titleInput.value,
                time: timeInput.value,
                completed: false,
                color: selectedColor,
            };

            // Tambahkan dan sort berdasarkan jam
            tasks = [...tasks, newTask].sort((a, b) => a.time.localeCompare(b.time));
            
            // Reset form
            titleInput.value = '';
            timeInput.value = '';
            toggleForm(); // Tutup form
            renderTasks(); // Render ulang
        });

        // Initial setup
        updateHeader();
        renderColorPicker();
        renderTasks();

        // Update clock every minute
        setInterval(updateHeader, 60000);

    </script>
</body>
</html>
